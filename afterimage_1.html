<style>
/* ============================================================
   AFTERIMAGE — 인터페이스 스타일 (v2 · 리파인)
   디자인 언어: 사전 표제어(dictionary entry) 구성 + 초경량 자간 워드마크.
   워드마크 'AFTERIMAGE'는 글자가 오른쪽으로 갈수록 서서히 사라지며
   게임의 핵심(잔상: 남았다가 사라지는 상)을 타이포그래피로 표현합니다.
   컬러 의미 체계(게임과 공유):
   - 시안(#48ebff)  = 현재의 나 / 상호작용
   - 레드핑크(#ff4d6d) = 과거의 나(위협)
   - 골드(#ffd34d)  = 목표(별) / 점수
============================================================ */
:root{
  --bg:#06090f;
  --tx:#e9edf6;         /* 본문 */
  --tx2:#97a0b5;        /* 보조 */
  --tx3:#5d6579;        /* 캡션 */
  --line:rgba(233,237,246,.10);
  --cy:#48ebff; --rd:#ff4d6d; --gd:#ffd34d;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overscroll-behavior:none}
body{
  background:#070b16;color:var(--tx);overflow:hidden;
  font-family:var(--sans);
  -webkit-user-select:none;user-select:none;touch-action:none;
  -webkit-tap-highlight-color:transparent;
}
#c{display:block;position:fixed;inset:0}
button{font-family:inherit}

/* ---------- HUD ---------- */
.hud{
  position:fixed;top:0;left:0;right:0;z-index:5;
  display:flex;justify-content:space-between;align-items:center;
  padding:max(14px,env(safe-area-inset-top)) 18px 0;
  pointer-events:none;
  visibility:hidden;opacity:0;transition:opacity .3s;
}
.hud.on{visibility:visible;opacity:1}
.hudcell{display:flex;align-items:baseline;gap:9px;min-width:86px}
.hudlab{font-size:10px;font-weight:600;letter-spacing:.26em;color:var(--tx3);text-transform:uppercase}
#score{color:var(--gd);font-size:21px;font-weight:300;font-variant-numeric:tabular-nums;text-shadow:0 2px 14px rgba(0,0,0,.6)}
#mid{color:var(--tx2);font-size:12.5px;font-weight:500;letter-spacing:.06em;font-variant-numeric:tabular-nums;text-shadow:0 2px 10px rgba(0,0,0,.6)}
#mute{
  pointer-events:auto;width:36px;height:36px;border-radius:50%;
  background:rgba(233,237,246,.04);border:1px solid var(--line);
  color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:color .2s,border-color .2s;
}
#mute:hover{color:var(--tx);border-color:rgba(233,237,246,.24)}
#mute:focus-visible{outline:2px solid var(--cy);outline-offset:2px}
#mute svg{width:16px;height:16px}
#mute .ic-off{display:none}
#mute.muted .ic-on{display:none}
#mute.muted .ic-off{display:block}

/* ---------- 오버레이 공통 ---------- */
.overlay{
  position:fixed;inset:0;z-index:10;padding:32px 24px;overflow-y:auto;
  display:flex;flex-direction:column;align-items:center;
  background:rgba(5,8,15,.72);
  -webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);
  transition:opacity .25s;
}
.stack{margin:auto;display:flex;flex-direction:column;align-items:center;text-align:center}
.hidden{opacity:0 !important;pointer-events:none !important;visibility:hidden}

/* 하이라인 플랭크(양옆 가는 선) — 사전 표제어 장치 */
.flank{display:flex;align-items:center;gap:14px}
.flank::before,.flank::after{content:'';width:26px;height:1px;background:var(--line)}

/* ---------- 타이틀(메뉴) ---------- */
.eyebrow{
  font-size:10px;font-weight:600;letter-spacing:.34em;text-transform:uppercase;
  color:var(--tx3);padding-left:.34em; /* 자간 보정 */
  margin-bottom:30px;
}
.title{
  font-weight:200;letter-spacing:.34em;text-indent:.34em; /* 마지막 자간 보정 */
  font-size:clamp(30px,7.6vw,64px);line-height:1.08;
  color:#eef4ff;white-space:nowrap;
}
@supports (-webkit-background-clip:text){
  .title{
    background:linear-gradient(90deg,#eef4ff 0%,rgba(238,244,255,.72) 58%,rgba(72,235,255,.15) 100%);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;color:transparent;
  }
}
.wordrow{margin-top:20px;font-size:15px;font-weight:300;letter-spacing:.3em;color:var(--tx2);padding-left:.3em}
.defrow{margin-top:13px;font-size:12.5px;font-weight:400;line-height:1.75;color:var(--tx3);max-width:34ch}

/* ---------- 규칙 범례 ---------- */
.rules{
  margin:38px 0 0;max-width:340px;text-align:left;
  display:flex;flex-direction:column;gap:13px;
  font-size:13px;line-height:1.65;color:var(--tx2);font-weight:400;
}
.rules b{color:#ff8098;font-weight:600}
.rule{display:flex;gap:12px}
.d{flex:none;width:6px;height:6px;border-radius:50%;margin-top:8px}
.cy{background:var(--cy)}
.gd{background:var(--gd)}
.rd{background:var(--rd)}

/* ---------- 버튼 ---------- */
.btn{
  margin-top:38px;cursor:pointer;min-width:216px;
  background:rgba(72,235,255,.06);
  border:1px solid rgba(72,235,255,.42);color:#d9f8ff;
  font-size:13px;font-weight:600;letter-spacing:.24em;text-indent:.24em;text-transform:uppercase;
  padding:16px 40px;border-radius:999px;
  transition:background .2s,border-color .2s,transform .08s;
}
.btn:hover{background:rgba(72,235,255,.13);border-color:rgba(72,235,255,.75)}
.btn:active{transform:translateY(1px)}
.btn:focus-visible{outline:2px solid var(--cy);outline-offset:3px}
.ghostbtn{
  margin-top:16px;cursor:pointer;
  background:transparent;border:none;color:var(--tx3);
  font-size:12px;font-weight:500;letter-spacing:.08em;
  padding:8px 18px;border-bottom:1px solid transparent;
  transition:color .2s;
}
.ghostbtn:hover{color:var(--tx2)}
.ghostbtn:focus-visible{outline:2px solid var(--cy);outline-offset:2px;border-radius:6px}

/* ---------- 메뉴 부가 정보 ---------- */
.menubest{margin-top:22px;font-size:11px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--tx3)}
.menubest em{font-style:normal;color:var(--gd);font-weight:400;font-size:13px;letter-spacing:.06em;margin-left:6px}
.foot{margin-top:30px;font-size:11.5px;color:var(--tx3);letter-spacing:.04em}

/* ---------- 언어 전환 ---------- */
.langs{
  position:absolute;top:max(18px,env(safe-area-inset-top));right:22px;
  display:flex;gap:18px;
}
.langs button{
  background:none;border:none;cursor:pointer;
  font-size:11px;font-weight:500;letter-spacing:.06em;
  color:var(--tx3);padding:4px 1px;
  border-bottom:1px solid transparent;
  transition:color .2s,border-color .2s;
}
.langs button:hover{color:var(--tx2)}
.langs button.on{color:var(--tx);border-bottom-color:rgba(72,235,255,.7)}
.langs button:focus-visible{outline:2px solid var(--cy);outline-offset:2px}

/* ---------- 준비 힌트 ---------- */
.hint{
  position:fixed;left:0;right:0;bottom:24%;z-index:6;
  text-align:center;pointer-events:none;
  color:var(--tx2);font-size:13px;font-weight:500;letter-spacing:.14em;
  text-shadow:0 2px 12px rgba(0,0,0,.7);
  animation:pulse 2s ease-in-out infinite;
  transition:opacity .2s;
}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.9}}

/* ---------- 결과/일시정지 패널 ---------- */
.panel{
  width:min(86vw,352px);padding:34px 32px 30px;border-radius:14px;
  background:rgba(9,12,20,.82);border:1px solid var(--line);
  -webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
  box-shadow:0 24px 80px rgba(0,0,0,.5);
  display:flex;flex-direction:column;align-items:center;text-align:center;
  margin:auto;
}
.ptitle{
  font-size:10px;font-weight:600;letter-spacing:.34em;text-transform:uppercase;
  color:var(--tx3);padding-left:.34em;
}
.psub{margin-top:12px;font-size:13px;color:var(--tx2)}
.big{margin-top:16px;font-size:56px;font-weight:200;color:var(--gd);font-variant-numeric:tabular-nums;line-height:1}
.stats{margin-top:12px;font-size:12.5px;color:var(--tx2);font-variant-numeric:tabular-nums;letter-spacing:.04em}
.bestline{margin-top:8px;font-size:12px;color:var(--tx3);letter-spacing:.04em;display:flex;align-items:center;gap:9px}
.new{
  display:none;padding:3px 9px;border-radius:999px;
  border:1px solid rgba(255,211,77,.55);color:var(--gd);
  font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
}
.tip{
  margin-top:20px;padding-top:16px;border-top:1px solid var(--line);
  font-size:12px;line-height:1.7;color:var(--tx3);font-style:italic;max-width:280px;
}

.installbtn{
  margin-top:20px;cursor:pointer;display:none;align-items:center;gap:9px;
  background:transparent;border:1px solid var(--line);color:var(--tx2);
  font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
  padding:11px 22px;border-radius:999px;
  transition:color .2s,border-color .2s;
}
.installbtn.show{display:inline-flex}
.installbtn:hover{color:var(--tx);border-color:rgba(72,235,255,.5)}
.installbtn:focus-visible{outline:2px solid var(--cy);outline-offset:2px}
.installbtn svg{width:14px;height:14px}

@media (prefers-reduced-motion: reduce){
  .hint{animation:none;opacity:.8}
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud" class="hud">
  <span class="hudcell"><span id="labScore" class="hudlab">점수</span><span id="score">0</span></span>
  <span id="mid">0:00 · 잔상 0</span>
  <button id="mute" aria-label="소리 끄기" aria-pressed="false">
    <svg class="ic-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 5 6.5 9H3v6h3.5L11 19V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.2 6a9 9 0 0 1 0 12"/></svg>
    <svg class="ic-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 5 6.5 9H3v6h3.5L11 19V5z"/><path d="m16 9.5 5 5M21 9.5l-5 5"/></svg>
  </button>
</div>

<!-- 타이틀(메뉴) -->
<div id="ovStart" class="overlay">
  <div class="langs" role="group" aria-label="Language">
    <button id="langKo" class="on">한국어</button>
    <button id="langEn">English</button>
    <button id="langZh">中文</button>
  </div>
  <div class="stack">
    <div id="eyebrow" class="eyebrow flank">한 손가락 아케이드</div>
    <h1 class="title">AFTERIMAGE</h1>
    <div id="wordRow" class="wordrow flank">잔상 · 殘像</div>
    <div id="defRow" class="defrow">명사 · 자극이 사라진 뒤에도 시야에 남는 상</div>
    <div class="rules">

</div>

<!-- 준비(첫 입력 대기) -->
<div id="hint" class="hint hidden">드래그하면 시작됩니다</div>

<!-- 일시정지 -->
<div id="ovPause" class="overlay hidden">
  <div class="panel">
    <div id="pauseT" class="ptitle flank">일시정지</div>
    <div id="pauseS" class="psub">화면을 탭하면 계속합니다</div>
  </div>
</div>

<!-- 게임 오버 -->
<div id="ovOver" class="overlay hidden">
  <div class="panel">
    <div id="overT" class="ptitle flank">기록</div>
    <div id="ovScore" class="big">0</div>
    <div id="ovStats" class="stats">생존 0:00 · 잔상 0</div>
    <div class="bestline"><span id="ovBest">세션 최고 0</span><span id="ovNew" class="new">신기록</span></div>
    <div id="ovTip" class="tip"></div>
    <button id="btnRetry" class="btn">다시 도전</button>
    <button id="btnMenu" class="ghostbtn">메뉴로</button>

<script>
'use strict';
/* ============================================================
   잔상 (AFTERIMAGE) — 원버튼 회피 아케이드
   ------------------------------------------------------------
   핵심 메커니즘:
   플레이어의 모든 이동 경로가 매 틱 기록되고, 일정 간격마다
   '잔상'이 스폰되어 그 기록을 처음부터 그대로 재생하며 쫓아온다.
   즉, 적의 난이도 = 플레이어 자신의 플레이.
   길게 살수록 자신의 과거가 아레나를 채운다.

   조작: 드래그/마우스 이동 하나. 별을 먹으면 +1점.
   판매/튜닝: 아래 CFG 블록의 숫자만 바꾸면 난이도·속도·페이스가
   전부 조절됩니다. 언어 문구는 I18N 블록에서 수정/추가 가능.
   외부 라이브러리·서버·에셋 의존성 없음.
============================================================ */

/* ---------- 튜닝 포인트 (판매 후 조정용) ---------- */
const CFG = {
  lang   : 'auto',               // 'auto' | 'ko' | 'en' | 'zh' — 기본 언어(auto=브라우저 감지)
  tickDt : 1/60,                 // 고정 시뮬레이션 스텝(초) — 잔상 재생 정확도의 기준
  player : { r:9,  lerp:0.18, maxSpd:600 },        // 반지름 / 추적 반응 / 최고속도(px/s)
  ghost  : { r:10, graceSec:1.2, hitForgive:0.74 },// 반지름 / 스폰 무적 / 판정 관용(작을수록 관대)
  spawn  : { first:5.0, base:5.5, accel:0.22, min:3.2, warn:1.2 }, // 첫 스폰 / 기본 간격 / 가속 / 최소 / 예고시간(초)
  gem    : { r:11, life:10, minFromPlayer:130, minFromGhost:80, margin:44 }, // 별 크기/수명(초)/스폰 안전거리
};

/* ---------- 다국어 문구 (판매 후 수정/추가 가능) ---------- */
const I18N = {
  ko: {
    doc:'잔상 — AFTERIMAGE',
    eyebrow:'한 손가락 아케이드',
    word:'잔상 · 殘像',
    def:'명사 · 자극이 사라진 뒤에도 시야에 남는 상',
    rule1:'손끝을 따라 움직입니다',
    rule2:'별이 사라지기 전에 먹으면 +1',
    rule3:'몇 초마다 <b>과거의 나</b>가 태어나 지나온 길을 그대로 되밟습니다 — 닿으면 끝',
    start:'시작하기', install:'앱으로 설치', foot:'멈추면 과거가 따라잡습니다',
    bestLab:'세션 최고',
    hint:'드래그하면 시작됩니다',
    pauseT:'일시정지', pauseS:'화면을 탭하면 계속합니다',
    overT:'기록',
    scoreLab:'점수', echo:'잔상',
    stats:(t,n)=>'생존 '+t+' · 잔상 '+n,
    best:(b)=>'세션 최고 '+b,
    newBest:'신기록',
    tipPre:'팁 — ',
    tips:[
      '시작 직후의 동선은 영원히 반복됩니다. 첫 5초를 깔끔하게.',
      '한가운데는 잔상이 태어나는 곳 — 빨간 링이 조이면 비켜서세요.',
      '큰 원을 그리며 돌면 잔상 행렬이 한 줄로 정리됩니다.',
      '멈추면 과거의 내가 정확히 그 자리로 옵니다. 계속 움직이세요.',
    ],
    retry:'다시 도전', menu:'메뉴로',
    ghostFloat:'잔상 +1',
    muteOn:'소리 끄기', muteOff:'소리 켜기',
  },
  en: {
    doc:'AFTERIMAGE',
    eyebrow:'A one-finger arcade',
    word:'[ ˈæf·tər·ɪm·ɪdʒ ]',
    def:'noun · an image that lingers after its source is gone',
    rule1:'You follow your fingertip.',
    rule2:'Catch each star before it fades — +1.',
    rule3:'Every few seconds a <b>past you</b> is born and retraces your exact path. Touch it and it\'s over.',
    start:'Begin', install:'Install app', foot:'Stand still and your past catches up.',
    bestLab:'Session best',
    hint:'Drag to begin',
    pauseT:'Paused', pauseS:'Tap to continue',
    overT:'Result',
    scoreLab:'Score', echo:'echoes',
    stats:(t,n)=>'survived '+t+' · '+n+' echoes',
    best:(b)=>'session best '+b,
    newBest:'New best',
    tipPre:'tip — ',
    tips:[
      'Your opening moves replay forever. Keep the first five seconds clean.',
      'Echoes are born at the center. When the red ring tightens, step aside.',
      'Sweep in wide circles and the echoes fall into a single file.',
      'Stop, and a past you arrives exactly where you stand. Keep moving.',
    ],
    retry:'Play again', menu:'Menu',
    ghostFloat:'echo +1',
    muteOn:'Mute sound', muteOff:'Unmute sound',
  },
  zh: {
    doc:'残影 — AFTERIMAGE',
    eyebrow:'单指街机游戏',
    word:'残影 · cán yǐng',
    def:'名词 · 刺激消失后仍留在视野中的影像',
    rule1:'你的光点跟随指尖移动。',
    rule2:'在星星消失前收集它 — +1 分。',
    rule3:'每隔几秒，一个<b>过去的你</b>诞生，并沿你走过的路径原样重演 — 碰到即结束。',
    start:'开始游戏', install:'安装为应用', foot:'停下脚步，过去就会追上你。',
    bestLab:'本次最高',
    hint:'拖动即开始',
    pauseT:'已暂停', pauseS:'点按屏幕继续',
    overT:'本局记录',
    scoreLab:'分数', echo:'残影',
    stats:(t,n)=>'存活 '+t+' · 残影 '+n,
    best:(b)=>'本次最高 '+b,
    newBest:'新纪录',
    tipPre:'提示 — ',
    tips:[
      '开局的路线会被永远重演。走好最初五秒。',
      '残影在中心诞生 — 红圈收紧时，请让开。',
      '沿大圆移动，残影队列会排成一条线。',
      '一旦停下，过去的你会准确到达你的位置。保持移动。',
    ],
    retry:'再来一局', menu:'返回菜单',
    ghostFloat:'残影 +1',
    muteOn:'关闭声音', muteOff:'开启声音',
  },
};

/* ---------- DOM ---------- */
const $ = id => document.getElementById(id);
const c = $('c'), ctx = c.getContext('2d');
const hud=$('hud'), scoreEl=$('score'), midEl=$('mid'), muteBtn=$('mute'), labScore=$('labScore');
const ovStart=$('ovStart'), ovPause=$('ovPause'), ovOver=$('ovOver'), hint=$('hint');
const ovScore=$('ovScore'), ovStats=$('ovStats'), ovBest=$('ovBest'), ovNew=$('ovNew'), ovTip=$('ovTip');
const menuBest=$('menuBest');
const langBtns={ko:$('langKo'),en:$('langEn'),zh:$('langZh')};

/* ---------- 상태 ---------- */
let state='menu';                 // menu | ready | play | pause | dying | over
let W=0,H=0,dpr=1,vign=null;
let tick=0, timeSec=0;
let history=[];                   // [x0,y0,x1,y1,...] 틱별 플레이어 위치(평탄 배열)
let ghosts=[];                    // {delay} — 위치 = history[tick - delay]
let parts=[], floats=[];
let px=0,py=0,tx=0,ty=0,sx=0,sy=0;// 플레이어 / 목표 / 잔상 스폰 원점
let gem=null;
let score=0, bestScore=0, deaths=0;
let spawnN=0, nextSpawnTick=0, warned=false;
let culprit=-1, shake=0, flash=0, dieTimer=0, armAt=0;
let muted=false, AC=null, master=null;

/* ---------- 언어 ---------- */
let lang='ko';
const L = () => I18N[lang];
function detectLang(){
  if(CFG.lang!=='auto' && I18N[CFG.lang]) return CFG.lang;
  const nl=((typeof navigator!=='undefined' && navigator.language)||'').toLowerCase();
  if(nl.startsWith('ko')) return 'ko';
  if(nl.startsWith('zh')) return 'zh';
  return 'en';
}
function applyLang(l){
  lang=l;
  const t=L();
  if(document.documentElement) document.documentElement.lang = l==='zh'?'zh-CN':l;
  document.title=t.doc;
  $('eyebrow').textContent=t.eyebrow;
  $('wordRow').textContent=t.word;
  $('defRow').textContent=t.def;
  $('rule1').textContent=t.rule1;
  $('rule2').textContent=t.rule2;
  $('rule3').innerHTML=t.rule3;          // 내부 정의 문자열만 사용(신뢰 소스)
  $('btnStart').textContent=t.start;
  $('foot').textContent=t.foot;
  $('installTxt').textContent=t.install;
  hint.textContent=t.hint;
  $('pauseT').textContent=t.pauseT;
  $('pauseS').textContent=t.pauseS;
  $('overT').textContent=t.overT;
  $('btnRetry').textContent=t.retry;
  $('btnMenu').textContent=t.menu;
  labScore.textContent=t.scoreLab;
  ovNew.textContent=t.newBest;
  muteBtn.setAttribute('aria-label', muted?t.muteOff:t.muteOn);
  for(const k in langBtns) langBtns[k].classList.toggle('on',k===l);
  refreshMenuBest();
}
function refreshMenuBest(){
  if(bestScore>0){
    menuBest.style.display='block';
    menuBest.innerHTML='';
    menuBest.appendChild(document.createTextNode(L().bestLab));
    const em=document.createElement('em'); em.textContent=String(bestScore);
    menuBest.appendChild(em);
  } else menuBest.style.display='none';
}

/* ---------- 유틸 ---------- */
const T = s => Math.round(s*60);
const sq = v => v*v;
const clamp = (v,a,b) => v<a?a:(v>b?b:v);
const dist2 = (ax,ay,bx,by) => { const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; };
const hx = t => history[(t-1)*2];
const hy = t => history[(t-1)*2+1];
const fmt = s => { s=Math.floor(s); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); };
const show = (el,on) => el.classList.toggle('hidden',!on);

/* ---------- 사운드 (WebAudio, 무의존) ---------- */
function initAudio(){
  if(AC) return;
  try{
    AC = new (window.AudioContext||window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0.4; master.connect(AC.destination);
  }catch(e){ AC=null; }
}
function resumeAudio(){ if(AC && AC.state==='suspended') AC.resume(); }
function tone(f0,f1,dur,type,vol,delay){
  if(!AC||muted) return;
  const t=AC.currentTime+(delay||0);
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(f0,t);
  if(f1) o.frequency.exponentialRampToValueAtTime(f1,t+dur);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t+dur+0.03);
}
const sfxCollect = ()=>{ tone(680,1020,0.09,'square',0.30,0); tone(1020,1360,0.10,'square',0.22,0.06); };
const sfxSpawn   = ()=>{ tone(150,88,0.22,'sawtooth',0.26,0); };
const sfxWarn    = ()=>{ tone(330,0,0.07,'sine',0.16,0); tone(330,0,0.07,'sine',0.13,0.14); };
const sfxDeath   = ()=>{ tone(300,58,0.5,'sawtooth',0.42,0); tone(210,50,0.55,'square',0.30,0.04); };
const sfxStart   = ()=>{ tone(420,840,0.14,'triangle',0.22,0); };
const sfxBest    = ()=>{ [523,659,784,1046].forEach((f,i)=>tone(f,0,0.12,'square',0.20,i*0.09)); };

/* ---------- 이펙트 ---------- */
function burst(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, v=60+Math.random()*220, L2=0.4+Math.random()*0.45;
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:L2,max:L2,r:1.4+Math.random()*1.8,col});
  }
}
function addFloat(x,y,txt,col){ floats.push({x,y,txt,col,life:0.9}); }

/* ---------- 게임 로직 ---------- */
function resetRun(){
  tick=0; timeSec=0;
  history.length=0; ghosts.length=0; parts.length=0; floats.length=0;
  score=0; spawnN=0; warned=false; culprit=-1; shake=0; flash=0;
  px=W/2; py=H/2; tx=px; ty=py; sx=px; sy=py;
  nextSpawnTick=T(CFG.spawn.first);
  spawnGem();
}

function spawnGem(){
  const m=CFG.gem.margin;
  let bx=W/2, by=H/3;
  for(let i=0;i<70;i++){
    const x=m+Math.random()*(W-2*m), y=m+Math.random()*(H-2*m);
    bx=x; by=y;
    if(dist2(x,y,px,py) < sq(CFG.gem.minFromPlayer)) continue;
    if(dist2(x,y,sx,sy) < sq(80)) continue;
    let bad=false;
    for(let k=0;k<ghosts.length;k++){
      const j=tick-ghosts[k].delay; if(j<1) continue;
      if(dist2(x,y,hx(j),hy(j)) < sq(CFG.gem.minFromGhost)){ bad=true; break; }
    }
    if(!bad){ gem={x,y,life:T(CFG.gem.life)}; return; }
  }
  gem={x:bx,y:by,life:T(CFG.gem.life)}; // 70회 실패 시 마지막 후보 채택(극히 드묾)
}

function step(){
  tick++;
  timeSec = tick/60;

  /* 플레이어: 포인터 추적 + 최고속도 제한 */
  const prevX=px, prevY=py;
  let mx=(tx-px)*CFG.player.lerp, my=(ty-py)*CFG.player.lerp;
  const sp=Math.hypot(mx,my), cap=CFG.player.maxSpd/60;
  if(sp>cap){ mx*=cap/sp; my*=cap/sp; }
  px=clamp(px+mx,14,W-14); py=clamp(py+my,14,H-14);
  history.push(px,py);

  /* 잔상 스폰 스케줄 (간격이 점점 짧아짐) */
  const warnT=T(CFG.spawn.warn);
  if(!warned && nextSpawnTick-tick<=warnT){ warned=true; sfxWarn(); }
  if(tick>=nextSpawnTick){
    ghosts.push({delay:tick});
    spawnN++; warned=false;
    const iv=Math.max(CFG.spawn.min, CFG.spawn.base - spawnN*CFG.spawn.accel);
    nextSpawnTick=tick+T(iv);
    addFloat(sx,sy-26,L().ghostFloat,'#ff7d96');
    sfxSpawn();
  }

  /* 별: 수명 감소 · 획득 */
  if(gem){
    gem.life--;
    if(gem.life<=0){ spawnGem(); }
    else if(dist2(px,py,gem.x,gem.y) < sq(CFG.player.r+CFG.gem.r+3)){
      score++;
      addFloat(gem.x,gem.y-14,'+1','#ffd34d');
      burst(gem.x,gem.y,'#ffd34d',14);
      sfxCollect();
      spawnGem();
    }
  }

  /* 잔상 충돌 (중간점 검사로 터널링 방지) */
  const grace=T(CFG.ghost.graceSec);
  const rr=sq((CFG.player.r+CFG.ghost.r)*CFG.ghost.hitForgive);
  for(let i=0;i<ghosts.length;i++){
    const j=tick-ghosts[i].delay;
    if(j<1 || j<=grace) continue;
    const gx=hx(j), gy=hy(j);
    let hit = dist2(px,py,gx,gy) < rr;
    if(!hit && j>=2){
      const mpx=(px+prevX)/2, mpy=(py+prevY)/2;
      const mgx=(gx+hx(j-1))/2, mgy=(gy+hy(j-1))/2;
      hit = dist2(mpx,mpy,mgx,mgy) < rr;
    }
    if(hit){ die(i); return; }
  }
}

function die(i){
  culprit=i; state='dying'; dieTimer=0.95; shake=15; flash=0.9;
  burst(px,py,'#ff4d6d',26);
  sfxDeath();
  try{ if(navigator.vibrate) navigator.vibrate(70); }catch(e){}
}

function showOver(){
  deaths++;
  let nb=false;
  if(score>bestScore){ bestScore=score; nb=true; }
  ovScore.textContent=String(score);
  ovStats.textContent=L().stats(fmt(timeSec),ghosts.length);
  ovBest.textContent=L().best(bestScore);
  ovNew.style.display = nb ? 'inline-block' : 'none';
  ovTip.textContent=L().tipPre+L().tips[(deaths-1)%L().tips.length];
  if(nb) sfxBest();
  hud.classList.remove('on');
  show(ovOver,true);
}

/* ---------- 상태 전환 ---------- */
function toMenu(){
  state='menu';
  show(ovOver,false); show(ovPause,false); show(hint,false); show(ovStart,true);
  hud.classList.remove('on');
  refreshMenuBest();
}
function startRun(){
  resetRun();
  show(ovStart,false); show(ovOver,false); show(ovPause,false); show(hint,true);
  hud.classList.add('on');
  state='ready';
  armAt=performance.now()+350; // 버튼 클릭이 곧바로 시작으로 새지 않도록 잠금
}
function beginPlay(p){
  state='play';
  show(hint,false);
  tx=p.x; ty=p.y; acc=0;
  sfxStart();
}

/* ---------- 입력 ---------- */
function isBtn(e){ return e.target && e.target.closest && e.target.closest('button'); }
function onDown(e){
  if(isBtn(e)) return;
  const p={x:e.clientX,y:e.clientY};
  if(state==='ready' && performance.now()>armAt) beginPlay(p);
  else if(state==='play'){ tx=p.x; ty=p.y; }
  else if(state==='pause'){ state='play'; show(ovPause,false); acc=0; }
}
function onMove(e){
  if(isBtn(e)) return;
  const p={x:e.clientX,y:e.clientY};
  if(state==='ready' && performance.now()>armAt) beginPlay(p);
  else if(state==='play'){ tx=p.x; ty=p.y; }
}
window.addEventListener('pointerdown',onDown);
window.addEventListener('pointermove',onMove);
window.addEventListener('touchmove',e=>{ if(state==='play'||state==='ready') e.preventDefault(); },{passive:false});
window.addEventListener('gesturestart',e=>e.preventDefault());   // iOS 핀치 줌 차단
window.addEventListener('dblclick',e=>e.preventDefault());

muteBtn.addEventListener('click',()=>{

/* ---------- 리사이즈 ---------- */
function resize(){
  dpr=Math.min(2,window.devicePixelRatio||1);
  W=window.innerWidth; H=window.innerHeight;
  c.width=Math.round(W*dpr); c.height=Math.round(H*dpr);
  c.style.width=W+'px'; c.style.height=H+'px';
  vign=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35, W/2,H/2,Math.max(W,H)*0.75);
  vign.addColorStop(0,'rgba(0,0,0,0)');
  vign.addColorStop(1,'rgba(0,0,0,0.45)');
  px=clamp(px,14,W-14); py=clamp(py,14,H-14);
  tx=clamp(tx,14,W-14); ty=clamp(ty,14,H-14);
  if(gem){ gem.x=clamp(gem.x,30,W-30); gem.y=clamp(gem.y,30,H-30); }
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>{ setTimeout(resize,120); setTimeout(resize,360); });
if(window.visualViewport){ window.visualViewport.addEventListener('resize',resize); }

/* ---------- 렌더 ---------- */
const specks=[];
for(let i=0;i<26;i++){
  specks.push({
    x:Math.random(), y:Math.random(),
    ax:20+Math.random()*40, ay:14+Math.random()*30,
    fx:0.2+Math.random()*0.5, fy:0.2+Math.random()*0.5,
    ph:Math.random()*6.283, r:1+Math.random()*2.2,
    col: Math.random()<0.7 ? 'rgba(72,235,255,0.5)' : 'rgba(255,77,109,0.5)'
  });
}

function drawSpecks(wall){
  ctx.globalAlpha=0.55;
  for(const s of specks){
    const x=s.x*W+Math.sin(wall*s.fx+s.ph)*s.ax;
    const y=s.y*H+Math.cos(wall*s.fy+s.ph)*s.ay;
    ctx.fillStyle=s.col;
    ctx.beginPath(); ctx.arc(x,y,s.r,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawRail(){
  /* 지나온 길 전체가 희미한 '잔상'으로 남는다 — 게임의 시각적 서명 */
  if(tick<12) return;
  const from=Math.max(1,tick-3600); // 최근 60초 분량만
  ctx.strokeStyle='rgba(72,235,255,0.045)';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(hx(from),hy(from));
  for(let t=from+6;t<=tick;t+=6) ctx.lineTo(hx(t),hy(t));
  ctx.stroke();
}

function drawWarning(){
  const warnT=T(CFG.spawn.warn), left=nextSpawnTick-tick;
  if(left>warnT||left<0) return;
  const f=1-left/warnT;
  ctx.strokeStyle='rgba(255,77,109,'+(0.25+0.65*f).toFixed(3)+')';
  ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(sx,sy,26-14*f,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='rgba(255,77,109,0.8)';
  ctx.beginPath(); ctx.arc(sx,sy,3,0,Math.PI*2); ctx.fill();
}

function drawGem(wall){
  const g=gem, pulse=1+0.07*Math.sin(wall*5);
  const r=CFG.gem.r*pulse;
  ctx.save();
  ctx.translate(g.x,g.y); ctx.rotate(wall*1.6);
  ctx.shadowColor='#ffd34d'; ctx.shadowBlur=16;
  ctx.fillStyle='#ffd34d';
  ctx.beginPath(); ctx.moveTo(0,-r); ctx.lineTo(r*0.72,0); ctx.lineTo(0,r); ctx.lineTo(-r*0.72,0); ctx.closePath(); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.beginPath(); ctx.moveTo(0,-r*0.42); ctx.lineTo(r*0.3,0); ctx.lineTo(0,r*0.42); ctx.lineTo(-r*0.3,0); ctx.closePath(); ctx.fill();
  ctx.restore();
  const fr=g.life/T(CFG.gem.life);
  ctx.strokeStyle='rgba(255,255,255,0.30)';
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(g.x,g.y,19,-Math.PI/2,-Math.PI/2+Math.PI*2*fr); ctx.stroke();
}

function drawGhosts(wall){
  const grace=T(CFG.ghost.graceSec);
  for(let i=0;i<ghosts.length;i++){
    const j=tick-ghosts[i].delay;
    if(j<1) continue;
    const gx=hx(j), gy=hy(j);
    const inGrace=j<=grace;
    const a=inGrace ? 0.28+0.24*Math.sin(wall*22) : 0.95;
    for(let k=3;k>=1;k--){ // 짧은 꼬리
      const t2=j-k*4; if(t2<1) continue;
      ctx.fillStyle='rgba(255,77,109,'+(0.10*(4-k)*(inGrace?0.4:1)).toFixed(3)+')';
      ctx.beginPath(); ctx.arc(hx(t2),hy(t2),CFG.ghost.r*0.72,0,Math.PI*2); ctx.fill();
    }
    ctx.save();
    if(!inGrace){ ctx.shadowColor='#ff4d6d'; ctx.shadowBlur=12; }
    ctx.globalAlpha=a;
    ctx.strokeStyle='#ff4d6d'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(gx,gy,CFG.ghost.r,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(255,77,109,0.28)';
    ctx.beginPath(); ctx.arc(gx,gy,CFG.ghost.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff9db0';
    ctx.beginPath(); ctx.arc(gx,gy,CFG.ghost.r*0.34,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawPlayer(){
  for(let k=6;k>=1;k--){ // 짧은 꼬리
    const t2=tick-k*2; if(t2<1) break;
    ctx.fillStyle='rgba(72,235,255,'+(0.05*(7-k)).toFixed(3)+')';
    ctx.beginPath(); ctx.arc(hx(t2),hy(t2),CFG.player.r*0.8,0,Math.PI*2); ctx.fill();
  }
  ctx.save();
  ctx.shadowColor='#48ebff'; ctx.shadowBlur=18;
  ctx.fillStyle='#48ebff';
  ctx.beginPath(); ctx.arc(px,py,CFG.player.r,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#eaffff';
  ctx.beginPath(); ctx.arc(px,py,CFG.player.r*0.42,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawCulprit(wall){
  const j=tick-ghosts[culprit].delay; if(j<1) return;
  const r=16+4*Math.sin(wall*10);
  ctx.strokeStyle='rgba(255,255,255,0.9)';
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(hx(j),hy(j),r,0,Math.PI*2); ctx.stroke();
}

function drawParts(){
  if(!parts.length) return;
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  for(const p of parts){
    ctx.globalAlpha=Math.max(0,p.life/p.max);
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawFloats(){
  if(!floats.length) return;
  ctx.save();
  ctx.font='600 13px system-ui, sans-serif';
  ctx.textAlign='center';
  for(const f of floats){
    ctx.globalAlpha=Math.max(0,Math.min(1,f.life/0.5));
    ctx.fillStyle=f.col;
    ctx.fillText(f.txt,f.x,f.y);
  }
  ctx.restore();
}

function render(dt,now){
  /* 시각 이펙트 물리(상태와 무관) */
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.life-=dt;
    if(p.life<=0){ parts.splice(i,1); continue; }
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    const damp=Math.pow(0.12,dt); p.vx*=damp; p.vy*=damp;
  }
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i]; f.life-=dt;
    if(f.life<=0){ floats.splice(i,1); continue; }
    f.y-=34*dt;
  }
  const wall=now/1000;
  let shx=0,shy=0;
  if(shake>0.2){
    shx=(Math.random()*2-1)*shake; shy=(Math.random()*2-1)*shake;
    shake*=Math.pow(0.02,dt);
  }
  ctx.setTransform(dpr,0,0,dpr,shx*dpr,shy*dpr);

  /* 배경 + 격자 */
  ctx.fillStyle='#070b16';
  ctx.fillRect(-60,-60,W+120,H+120);
  ctx.strokeStyle='rgba(122,160,255,0.05)';
  ctx.lineWidth=1;
  ctx.beginPath();
  for(let x=48;x<W;x+=48){ ctx.moveTo(x,0); ctx.lineTo(x,H); }
  for(let y=48;y<H;y+=48){ ctx.moveTo(0,y); ctx.lineTo(W,y); }
  ctx.stroke();

  if(state==='menu'){
    drawSpecks(wall);
    ctx.fillStyle=vign; ctx.fillRect(0,0,W,H);
    return;
  }

  drawRail();
  if(state==='play') drawWarning();
  if(gem) drawGem(wall);
  drawGhosts(wall);
  drawPlayer();
  drawParts();
  drawFloats();
  ctx.fillStyle=vign; ctx.fillRect(0,0,W,H);

  if(flash>0){
    ctx.fillStyle='rgba(255,60,86,'+(flash*0.5).toFixed(3)+')';
    ctx.fillRect(-60,-60,W+120,H+120);
    flash=Math.max(0,flash-dt*1.3);
  }
  if((state==='dying'||state==='over') && culprit>=0) drawCulprit(wall);

  scoreEl.textContent=String(score);
  midEl.textContent=fmt(timeSec)+' · '+L().echo+' '+ghosts.length;
}

/* ---------- 메인 루프 (고정 스텝 누산기) ---------- */
let last=performance.now(), acc=0;
function frame(now){
  requestAnimationFrame(frame);
  let dt=(now-last)/1000; last=now;
  if(dt>0.1) dt=0.1;
  if(dt<0) dt=0;

  if(state==='play'){
    acc+=dt;
    let n=0;
    while(acc>=CFG.tickDt && n<5){
      step(); acc-=CFG.tickDt; n++;
      if(state!=='play') break;
    }
    if(n>=5) acc=0;
  } else if(state==='dying'){
    dieTimer-=dt;
    if(dieTimer<=0){ state='over'; showOver(); }
  }
  render(dt,now);
}

function setupPWA(){
  try{
    // 호스팅 위치와 무관하게 start_url을 현재 주소로 맞춘 매니페스트를 런타임 주입
    const base = (location.href.split('#')[0]);
    const manifest = {
      name:'AFTERIMAGE 잔상', short_name:'AFTERIMAGE',
      description:'One-finger arcade — your own past chases you.',
      id: base, start_url: base, scope: './',
      display:'standalone', orientation:'any',
      background_color:'#070b16', theme_color:'#070b16',
      icons:[
        { src:ICONS.i192, sizes:'192x192', type:'image/png', purpose:'any' },
        { src:ICONS.i512m, sizes:'512x512', type:'image/png', purpose:'any maskable' }
      ]
    };
    const link=document.getElementById('manifest');
    if(link) link.setAttribute('href','data:application/manifest+json,'+encodeURIComponent(JSON.stringify(manifest)));
  }catch(e){}
}
let deferredPrompt=null;
const btnInstall=$('btnInstall');
window.addEventListener('beforeinstallprompt',e=>{   // Android/Chrome 계열
  e.preventDefault(); deferredPrompt=e;
  if(state==='menu' && btnInstall) btnInstall.classList.add('show');
});
window.addEventListener('appinstalled',()=>{ deferredPrompt=null; if(btnInstall) btnInstall.classList.remove('show'); });
if(btnInstall){
  btnInstall.addEventListener('click',async()=>{
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    try{ await deferredPrompt.userChoice; }catch(e){}
    deferredPrompt=null; btnInstall.classList.remove('show');
  });
}

/* ---------- 시작 ---------- */
applyLang(detectLang());
setupPWA();
resize();
toMenu();
requestAnimationFrame(frame);
